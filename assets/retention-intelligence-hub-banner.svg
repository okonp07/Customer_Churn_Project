<svg width="1280" height="720" viewBox="0 0 1280 720" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Retention Intelligence Hub preview banner</title>
  <desc id="desc">Stylized preview banner for the customer churn Streamlit application.</desc>
  <defs>
    <linearGradient id="bg" x1="74" y1="48" x2="1218" y2="673" gradientUnits="userSpaceOnUse">
      <stop stop-color="#120A20"/>
      <stop offset="0.52" stop-color="#1D1430"/>
      <stop offset="1" stop-color="#05010D"/>
    </linearGradient>
    <linearGradient id="card" x1="178" y1="162" x2="1042" y2="597" gradientUnits="userSpaceOnUse">
      <stop stop-color="#2A1D43" stop-opacity="0.9"/>
      <stop offset="1" stop-color="#120C1E" stop-opacity="0.96"/>
    </linearGradient>
    <linearGradient id="tile" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#A855F7" stop-opacity="0.28"/>
      <stop offset="1" stop-color="#312E81" stop-opacity="0.12"/>
    </linearGradient>
  </defs>

  <rect width="1280" height="720" rx="36" fill="url(#bg)"/>
  <circle cx="154" cy="102" r="160" fill="#A855F7" fill-opacity="0.16"/>
  <circle cx="1138" cy="118" r="190" fill="#6D28D9" fill-opacity="0.14"/>
  <circle cx="1094" cy="626" r="210" fill="#581C87" fill-opacity="0.12"/>

  <rect x="64" y="56" width="1152" height="608" rx="30" fill="url(#card)" stroke="#D8B4FE" stroke-opacity="0.18"/>

  <text x="112" y="132" fill="#D8B4FE" font-family="Segoe UI, Arial, sans-serif" font-size="22" font-weight="700" letter-spacing="5">
    STREAMLIT DEPLOYMENT
  </text>
  <text x="112" y="216" fill="white" font-family="Segoe UI, Arial, sans-serif" font-size="62" font-weight="800">
    Retention Intelligence Hub
  </text>
  <text x="112" y="266" fill="#C9CBD3" font-family="Segoe UI, Arial, sans-serif" font-size="26">
    Customer churn scoring, batch uploads, model diagnostics, and portfolio EDA.
  </text>

  <rect x="112" y="322" width="304" height="116" rx="24" fill="url(#tile)" stroke="#D8B4FE" stroke-opacity="0.16"/>
  <text x="144" y="364" fill="#9DA3B4" font-family="Segoe UI, Arial, sans-serif" font-size="20" font-weight="600">
    Holdout ROC-AUC
  </text>
  <text x="144" y="413" fill="white" font-family="Segoe UI, Arial, sans-serif" font-size="38" font-weight="800">
    0.860
  </text>

  <rect x="448" y="322" width="304" height="116" rx="24" fill="url(#tile)" stroke="#D8B4FE" stroke-opacity="0.16"/>
  <text x="480" y="364" fill="#9DA3B4" font-family="Segoe UI, Arial, sans-serif" font-size="20" font-weight="600">
    5-fold CV ROC-AUC
  </text>
  <text x="480" y="413" fill="white" font-family="Segoe UI, Arial, sans-serif" font-size="38" font-weight="800">
    0.862
  </text>

  <rect x="784" y="322" width="320" height="116" rx="24" fill="url(#tile)" stroke="#D8B4FE" stroke-opacity="0.16"/>
  <text x="816" y="364" fill="#9DA3B4" font-family="Segoe UI, Arial, sans-serif" font-size="20" font-weight="600">
    Portfolio churn rate
  </text>
  <text x="816" y="413" fill="white" font-family="Segoe UI, Arial, sans-serif" font-size="38" font-weight="800">
    20.4%
  </text>

  <rect x="112" y="482" width="992" height="104" rx="24" fill="#120C1E" stroke="#D8B4FE" stroke-opacity="0.12"/>
  <text x="144" y="528" fill="#D8B4FE" font-family="Segoe UI, Arial, sans-serif" font-size="22" font-weight="700">
    Workspaces
  </text>
  <text x="144" y="567" fill="#C9CBD3" font-family="Segoe UI, Arial, sans-serif" font-size="22">
    Single Customer Scoring   |   Batch CSV Scoring   |   Model Room   |   EDA Lab   |   About
  </text>
</svg>
